name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-type-test:
    name: Lint, Type Check, And Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: cs2_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: change_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cs2_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: development
      DEBUG_MODE: "false"
      API_HOST: 127.0.0.1
      API_PORT: "8000"
      API_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:8501,http://127.0.0.1:8501
      DB_NAME: cs2_db
      DB_USER: postgres
      DB_PASS: change_me
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"

    steps:
      - name: Check out repository
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        # actions/setup-python@v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check cs2_analytics api main.py run_api.py manage_db.py --select E,F --ignore E501

      - name: Type check runtime code
        run: uv run mypy cs2_analytics api/main.py api/routes api/schemas api/services main.py run_api.py manage_db.py --ignore-missing-imports --follow-imports=skip

      - name: Run migrations
        run: uv run alembic -c cs2_analytics/alembic.ini upgrade head

      - name: Run tests with coverage gate
        run: uv run pytest --cov

      - name: Generate coverage badge data
        run: uv run python scripts/generate_coverage_badge.py coverage-badge.json

      - name: Upload coverage badge data
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-badge
          path: coverage-badge.json

  publish-coverage-badge:
    name: Publish Coverage Badge
    needs: lint-type-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Download coverage badge data
        # actions/download-artifact@v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: coverage-badge

      - name: Publish to the badges branch
        # The badges branch holds only generated output, so it is
        # recreated as a single-commit orphan branch on every publish.
        run: |
          git init -b badges badge-publish
          cd badge-publish
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp ../coverage-badge.json coverage.json
          git add coverage.json
          git commit -m "Update coverage badge for ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
