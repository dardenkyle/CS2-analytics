services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: "${DB_NAME:-cs2_db}"
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASS:-change_me}"
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    image: cs2-analytics:local
    environment: &app_environment
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      DEBUG_MODE: "${DEBUG_MODE:-false}"
      API_HOST: "0.0.0.0"
      API_PORT: "${API_PORT:-8000}"
      API_CORS_ORIGINS: "${API_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:8501,http://127.0.0.1:8501,http://localhost:8000,http://127.0.0.1:8000}"
      DB_NAME: "${DB_NAME:-cs2_db}"
      DB_USER: "${DB_USER:-postgres}"
      DB_PASS: "${DB_PASS:-change_me}"
      DB_HOST: "db"
      DB_PORT: "5432"
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ./logs:/app/logs
      - ./demos:/app/demos
      - ./parsed_data:/app/parsed_data
    shm_size: "2gb"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; port = os.environ.get('API_PORT', '8000'); urllib.request.urlopen('http://127.0.0.1:' + port + '/', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  migrate:
    image: cs2-analytics:local
    build:
      context: .
    profiles: ["tools"]
    environment: *app_environment
    command: ["python", "manage_db.py", "--init"]
    depends_on:
      db:
        condition: service_healthy

  pipeline:
    image: cs2-analytics:local
    build:
      context: .
    profiles: ["tools"]
    environment: *app_environment
    command: ["python", "main.py"]
    volumes:
      - ./logs:/app/logs
      - ./demos:/app/demos
      - ./parsed_data:/app/parsed_data
    shm_size: "2gb"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
